<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luminary — Where Ideas Glow</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'DM Sans', sans-serif; margin:0; background:#f5f0e8; }
    nav { background:#111; color:#fff; padding:1rem; display:flex; justify-content:space-between; }
    nav a { color:#fff; margin:0 10px; text-decoration:none; cursor:pointer; }

    .page { display:none; padding:2rem; }
    .active { display:block; }

    .contact-wrap { display:flex; gap:2rem; flex-wrap:wrap; }
    .contact-form { display:flex; flex-direction:column; gap:1rem; width:100%; max-width:400px; }

    input, textarea, select {
      padding:10px;
      border:1px solid #ccc;
    }

    button {
      padding:10px;
      background:#111;
      color:#fff;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<nav>
  <div>Luminary</div>
  <div>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('about')">About</a>
    <a onclick="showPage('contact')">Contact</a>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Welcome to Luminary</h1>
  <p>Creative studio website.</p>
</div>

<!-- ABOUT -->
<div id="about" class="page">
  <h1>About Us</h1>
  <p>We are a creative design studio.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h1>Contact Us</h1>

  <div class="contact-wrap">
    <div>
      <p><strong>Email:</strong> hello@luminary.studio</p>
      <p><strong>Phone:</strong> +1 555 123 4567</p>
      <p><strong>Address:</strong> San Francisco, CA</p>
    </div>

    <!-- ✅ WORKING EMAIL FORM -->
    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <input type="text" name="first_name" placeholder="First Name" required>
      <input type="text" name="last_name" placeholder="Last Name" required>

      <input type="email" name="email" placeholder="Email" required>

      <select name="subject">
        <option value="">Select Subject</option>
        <option>General Inquiry</option>
        <option>Design</option>
      </select>

      <textarea name="message" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>

  </div>
</div>

<script>
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
